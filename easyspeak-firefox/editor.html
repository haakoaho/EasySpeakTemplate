<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasySpeak Agenda Editor — Oslo Toastmasters</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a; color: #dde1ec;
      margin: 0; padding: 24px 16px 80px; min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(90deg, #6c63ff, #3ecf8e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 0 0 4px;
    }
    .subtitle { font-size: 13px; color: #888; margin: 0 0 20px; }
    #sourceBanner {
      display: none;
      background: rgba(62,207,142,0.12); border: 1px solid rgba(62,207,142,0.35);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #3ecf8e; margin-bottom: 20px;
    }
    details {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
    }
    summary { cursor: pointer; font-size: 13px; color: #888; user-select: none; }
    summary:hover { color: #bbb; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block; font-size: 12px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    input[type="text"], textarea {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      color: #dde1ec; font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #6c63ff; }
    textarea { resize: vertical; min-height: 90px; font-family: monospace; font-size: 12px; }
    .editor-section {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 18px; margin-bottom: 20px;
    }
    .editor-section h3 {
      font-size: 15px; font-weight: 700; color: #fff; margin: 0 0 14px;
      padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .field-row {
      display: grid; grid-template-columns: 170px 1fr;
      align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .field-row label { font-size: 12px; color: #888; margin: 0; text-transform: none; letter-spacing: 0; }
    .speech-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(108,99,255,0.25);
      border-radius: 10px; padding: 14px; margin-bottom: 14px;
    }
    .speech-card h4 {
      font-size: 12px; font-weight: 700; color: #6c63ff; margin: 0 0 12px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    button.primary {
      background: linear-gradient(135deg, #6c63ff, #3ecf8e); color: #fff; border: none;
      border-radius: 10px; padding: 13px 28px; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; transition: opacity 0.2s, transform 0.1s;
    }
    button.primary:hover { opacity: 0.9; transform: translateY(-1px); }
    button.primary:disabled { opacity: 0.4; cursor: default; transform: none; }
    button.secondary {
      background: rgba(255,255,255,0.08); color: #ccc;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      padding: 8px 16px; font-size: 13px; cursor: pointer; margin-top: 8px;
    }
    button.secondary:hover { background: rgba(255,255,255,0.14); }
    #status {
      margin-top: 14px; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; text-align: center; display: none;
    }
    #status.info    { display: block; background: rgba(108,99,255,0.15); color: #9d97ff; }
    #status.success { display: block; background: rgba(62,207,142,0.15); color: #3ecf8e; }
    #status.error   { display: block; background: rgba(255,107,107,0.15); color: #ff6b6b; }
  </style>
</head>
<body>
<div class="container">
  <h1>EasySpeak Agenda Editor</h1>
  <p class="subtitle">Oslo Toastmasters — Meeting Setup</p>
  <div id="sourceBanner">✅ Agenda imported from EasySpeak — review and edit below.</div>

  <details id="pasteSection">
    <summary>📋 Paste HTML manually (fallback)</summary>
    <div style="margin-top:14px">
      <div class="form-group">
        <label for="htmlContent">Paste Agenda HTML</label>
        <textarea id="htmlContent" placeholder="Paste the copied HTML here..."></textarea>
      </div>
      <button class="secondary" id="parseBtn">Parse Pasted HTML</button>
    </div>
  </details>

  <div id="editorContainer" style="display:none">
    <div class="form-group">
      <label for="meetingTheme">Meeting Theme (Optional)</label>
      <input type="text" id="meetingTheme" placeholder="e.g. Innovation & Leadership" />
    </div>
    <div id="rolesEditor" class="editor-section"></div>
    <div id="speakersEditor" class="editor-section"></div>
    <div class="editor-section">
      <h3>Extra Info</h3>
      <div class="field-row">
        <label for="wordOfDay">Word of the Day</label>
        <input type="text" id="wordOfDay" placeholder="Optional" />
      </div>
    </div>
    <button class="primary" id="generateBtn" type="button">💾 Save & Launch Meeting Slides</button>
  </div>
  <div id="status"></div>
</div>
<script src="editor.js"></script>
</body>
</html>
