<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EasySpeak Importer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      padding: 20px;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6c63ff, #3ecf8e);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .logo h2 { font-size: 15px; margin: 0; color: #fff; font-weight: 700; }
    .logo p  { font-size: 11px; margin: 2px 0 0; color: #888; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 14px 0; }
    p.desc { font-size: 12px; color: #aaa; margin: 0 0 16px; line-height: 1.6; }
    .warning {
      background: rgba(255,200,100,0.1); border: 1px solid rgba(255,200,100,0.3);
      border-radius: 8px; padding: 9px 11px; font-size: 11px; color: #ffc864;
      margin-bottom: 14px; line-height: 1.5;
    }
    button {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #6c63ff, #3ecf8e);
      color: #fff; border: none; border-radius: 9px;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { margin-top: 11px; font-size: 12px; text-align: center; min-height: 16px; }
    .success { color: #3ecf8e; }
    .error   { color: #ff6b6b; }
    .info    { color: #9d97ff; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">🎤</div>
    <div><h2>EasySpeak Importer</h2><p>Oslo Toastmasters</p></div>
  </div>
  <hr />
  <p class="desc">Navigate to the EasySpeak meeting agenda, then click below to import it into the editor.</p>
  <div id="warning" class="warning" style="display:none">
    ⚠️ This doesn't look like an EasySpeak page. Navigate to the meeting agenda first.
  </div>
  <button id="importBtn">Import Agenda → Open Editor</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
